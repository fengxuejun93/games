<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四川血战到底麻将</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">四川血战到底</div>
            <div class="game-info">
                <span class="round-info">第 <span id="round">1</span> 局</span>
                <span class="score-info">得分: <span id="score">0</span></span>
            </div>
        </div>

        <div class="game-table">
            <div class="player-area top-player" id="player1">
                <div class="player-name">玩家1</div>
                <div class="player-cards" id="player1-cards"></div>
                <div class="player-status" id="player1-status"></div>
            </div>

            <div class="player-area right-player" id="player2">
                <div class="player-name">玩家2</div>
                <div class="player-cards" id="player2-cards"></div>
                <div class="player-status" id="player2-status"></div>
            </div>

            <div class="player-area bottom-player" id="player3">
                <div class="player-name">你</div>
                <div class="player-cards" id="player3-cards"></div>
                <div class="player-status" id="player3-status"></div>
            </div>

            <div class="player-area left-player" id="player0">
                <div class="player-name">玩家0</div>
                <div class="player-cards" id="player0-cards"></div>
                <div class="player-status" id="player0-status"></div>
            </div>

            <div class="center-area">
                <div class="deck-area">
                    <div class="deck" id="deck">
                        <div class="deck-count" id="deck-count">84</div>
                    </div>
                </div>
                <div class="discard-pile" id="discard-pile"></div>
                <div class="last-card" id="last-card"></div>
            </div>
        </div>

        <div class="action-panel">
            <div class="action-buttons">
                <button class="action-btn" id="btn-chow" disabled>吃</button>
                <button class="action-btn" id="btn-peng" disabled>碰</button>
                <button class="action-btn" id="btn-gang" disabled>杠</button>
                <button class="action-btn" id="btn-hu" disabled>胡</button>
                <button class="action-btn" id="btn-pass">过</button>
            </div>
            <div class="game-message" id="game-message"></div>
        </div>

        <div class="control-panel">
            <button class="control-btn" id="btn-restart">重新开局</button>
            <button class="control-btn" id="btn-music">🎵 音乐</button>
        </div>

        <div class="modal-overlay" id="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h2 id="modal-title"></h2>
                <div id="modal-body"></div>
                <button class="modal-btn" id="modal-btn">确定</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script src="game.js"></script>
</body>
</html>
